services:
  postgres:
    # PostgreSQL is the local stand-in for the future managed RDS database.
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engiflow}
      POSTGRES_USER: ${POSTGRES_USER:-engiflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engiflow_dev_password}
    healthcheck:
      # The API waits for this health check so local startup is deterministic.
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      # Persist local database state across container restarts.
      - postgres-data:/var/lib/postgresql
    networks:
      - engiflow

  minio:
    # S3-compatible object storage for ECO attachments in local development.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - engiflow

  minio-init:
    # Creates the attachment bucket on local startup.
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}"; do sleep 2; done &&
        mc mb -p "local/${MINIO_BUCKET:-engiflow-attachments}" || true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-engiflow-attachments}
    networks:
      - engiflow

  mailpit:
    # Local SMTP sink used for password-recovery development and tests.
    image: axllent/mailpit:v1.30.0
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - engiflow

  api:
    # Production-style image for the ASP.NET Core boundary of the Clean Architecture stack.
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-engiflow};Username=${POSTGRES_USER:-engiflow};Password=${POSTGRES_PASSWORD:-engiflow_dev_password}
      EngiFlow__Storage__S3__BucketName: ${MINIO_BUCKET:-engiflow-attachments}
      EngiFlow__Storage__S3__Region: us-east-1
      EngiFlow__Storage__S3__ServiceUrl: http://minio:9000
      EngiFlow__Storage__S3__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      EngiFlow__Storage__S3__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      EngiFlow__Storage__S3__ForcePathStyle: "true"
      EngiFlow__Email__Smtp__Host: mailpit
      EngiFlow__Email__Smtp__Port: "1025"
      EngiFlow__Email__Smtp__UseStartTls: "false"
      EngiFlow__Email__Smtp__FromEmail: no-reply@localhost
      EngiFlow__Email__Smtp__FromName: EngiFlow
    ports:
      - "8080:8080"
    networks:
      - engiflow

  web:
    # Production-style Next.js image using standalone output from next.config.ts.
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8080}
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - engiflow

networks:
  engiflow:
    # A dedicated bridge network keeps service discovery explicit and local to the stack.
    driver: bridge

volumes:
  # Named volume keeps PostgreSQL data outside the container lifecycle.
  postgres-data:
  # Named volume keeps MinIO object data outside the container lifecycle.
  minio-data:
